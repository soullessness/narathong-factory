name: Deploy Database Schema

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
          
      - name: Run migrations
        run: |
          supabase db push --include-all \
            --db-url "postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.hnywjobqljvpxbxlrahd.supabase.co:5432/postgres"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
